<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dispensary products — search</title>
<style>
 /* Full-viewport flex column: the heading + filters + count stay fixed at the top and only the
    table area (.tablewrap) scrolls, so everything above and including the column headers stays put. */
 body{font:15px/1.5 system-ui,sans-serif;max-width:1000px;margin:0 auto;padding:.6rem 1rem 0;
   color:#1a1a1a;height:100vh;display:flex;flex-direction:column}
 h1{margin:.2rem 0} .sub{color:#666;margin:0 0 1rem}
 .filters{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin:.5rem 0 1rem}
 .filters input,.filters select{padding:.35rem .5rem;border:1px solid #ccc;border-radius:6px;font:inherit}
 #q{flex:1;min-width:200px}
 .count{color:#666;margin:.5rem 0}
 .tablewrap{flex:1;min-height:0;overflow:auto}              /* the only scroll region */
 table{width:100%;border-collapse:collapse;font-size:14px}
 th,td{text-align:left;padding:.35rem .5rem;border-bottom:1px solid #eee}
 td.num{text-align:right;font-variant-numeric:tabular-nums}
 tbody tr:nth-child(even){background:#f4f5f7}                 /* zebra striping */
 thead th{position:sticky;top:0;z-index:1;cursor:pointer;user-select:none;color:#0a58ca;
   background:#fff;box-shadow:inset 0 -1px 0 #ccc}            /* header row stays while rows scroll */
 footer{color:#888;font-size:.85rem;margin:1rem 0}
</style></head><body>
<h1>Dispensary product search</h1>
<p class="sub">Live menus across every store in a state — collapsed brand, normalized category, potency, price.</p>
<div class="filters">
 <select id="state"><option value="PA">PA</option></select>
 <input id="q" placeholder="search name or brand…">
 <select id="brand"><option value="">all brands</option></select>
 <select id="cat"><option value="">all categories</option></select>
 <select id="ptype"><option value="">all types</option></select>
 <select id="strain"><option value="">all strains</option></select>
 <input id="city" list="citylist" placeholder="city…" style="width:140px">
 <datalist id="citylist"></datalist>
 <select id="store"><option value="">all stores</option></select>
 <select id="size"><option value="">all sizes</option></select>
 <input id="thc" type="number" min="0" placeholder="min THC%" style="width:90px">
 <input id="pmax" type="number" min="0" placeholder="max $" style="width:80px">
</div>
<div class="count" id="count"></div>
<div class="tablewrap">
<table><thead><tr>
 <th data-k="n">Product</th><th data-k="b">Brand</th><th data-k="c">Category</th>
 <th data-k="pt">Type</th><th data-k="t">Strain</th><th data-k="thc" class="num">THC%</th>
 <th data-k="cbd" class="num">CBD%</th><th data-k="p" class="num">$</th>
 <th data-k="sz">Size</th><th data-k="tp:Myrcene" class="num" title="Myrcene (% terpene)">Myr</th><th data-k="tp:Limonene" class="num" title="Limonene (% terpene)">Lim</th><th data-k="tp:Caryophyllene" class="num" title="Caryophyllene (% terpene)">Car</th><th data-k="tp:Pinene" class="num" title="Pinene (% terpene)">Pin</th><th data-k="tp:Linalool" class="num" title="Linalool (% terpene)">Lin</th><th data-k="tp:Terpinolene" class="num" title="Terpinolene (% terpene)">Ter</th><th data-k="tp:Humulene" class="num" title="Humulene (% terpene)">Hum</th><th data-k="tp:Ocimene" class="num" title="Ocimene (% terpene)">Oci</th><th data-k="tp:Bisabolol" class="num" title="Bisabolol (% terpene)">Bis</th><th data-k="store">Store</th>
</tr></thead><tbody id="rows"></tbody></table>
<footer>dispensary intelligence pipeline · forehead-prosthesis/dispo-scrape</footer>
</div>
<script>
const CAP = 500;  // render at most this many rows; the count shows the full match total
const TERPENES = ["Myrcene", "Limonene", "Caryophyllene", "Pinene", "Linalool", "Terpinolene", "Humulene", "Ocimene", "Bisabolol"];  // canonical terpene columns
const USE_PARQUET = true;  // load .parquet shards (zstd, ~40% smaller) when exported
let PRODUCTS = [], STORES = {}, sortK = "n", sortDir = 1;
const $ = id => document.getElementById(id);
const getv = (x, k) => k === 'store' ? ((STORES[x.s]||{}).n||'')
  : k.startsWith('tp:') ? ((x.tp||{})[k.slice(3)]) : x[k];

// Load a state's products: prefer the compact .parquet shard decoded in-browser by the vendored
// hyparquet bundle (no CDN, pure-JS zstd); fall back to the .json shard on any error so the page
// always works. The terpene map rides as a JSON string column, parsed back here.
async function loadProducts(st) {
  if (USE_PARQUET) {
    try {
      const { parquetReadObjects, compressors } = await import('./parquet.min.js');
      const ab = await fetch(`products/${st}.parquet`)
        .then(r => { if (!r.ok) throw new Error(`parquet ${r.status}`); return r.arrayBuffer(); });
      const rows = await parquetReadObjects({ file: ab, compressors });
      for (const r of rows) r.tp = r.tp ? JSON.parse(r.tp) : null;
      return rows;
    } catch (e) { console.warn('parquet load failed — falling back to JSON', e); }
  }
  return (await fetch(`products/${st}.json`).then(r => r.json())).products;
}

async function loadState(st) {
  const [products, s] = await Promise.all([
    loadProducts(st),
    fetch('stores.json').then(r => r.json()),
  ]);
  PRODUCTS = products; STORES = s;
  // Precompute a lowercased name+brand search key ONCE per row, so the text filter doesn't
  // re-lowercase 145k names on every keystroke.
  PRODUCTS.forEach(x => { x._q = ((x.n || '') + ' ' + (x.b || '')).toLowerCase(); });
  const cats = [...new Set(PRODUCTS.map(x => x.c).filter(Boolean))].sort();
  $('cat').innerHTML = '<option value="">all categories</option>' +
    cats.map(c => `<option>${c}</option>`).join('');
  fillTypes();     // product-type dropdown — scoped to the chosen category
  fillStrains();   // strain dropdown — scoped to the chosen category + type
  fillBrands();    // brand dropdown — scoped to the chosen category + type + strain
  fillStores();    // store dropdown — scoped to the chosen category + type + strain + brand
  fillSizes();     // size dropdown — scoped to the chosen category + type + strain + brand + store
  fillCities();    // city autocomplete — scoped to all of the above
  render();
}

// Populate the product-type dropdown with only the chosen category's types (all types when no
// category is selected), counts + alphabetical. Keeps the current pick if still valid, else resets.
function fillTypes() {
  const cat = $('cat').value, cur = $('ptype').value;
  const ptc = {};
  PRODUCTS.forEach(x => { if (x.pt && (!cat || x.c === cat)) ptc[x.pt] = (ptc[x.pt] || 0) + 1; });
  const ptypes = Object.keys(ptc).sort((a, b) => a.localeCompare(b));
  $('ptype').innerHTML = '<option value="">all types</option>' +
    ptypes.map(t => `<option value="${t}">${t} (${ptc[t].toLocaleString()})</option>`).join('');
  $('ptype').value = ptypes.includes(cur) ? cur : '';
}

// Populate the strain dropdown with only the strains present under the chosen category + type
// (cascades below them). Keeps the current pick if still valid, else resets.
function fillStrains() {
  const cat = $('cat').value, ptype = $('ptype').value, cur = $('strain').value;
  const set = new Set();
  PRODUCTS.forEach(x => {
    if (x.t && (!cat || x.c === cat) && (!ptype || x.pt === ptype)) set.add(x.t);
  });
  const strains = [...set].sort();
  $('strain').innerHTML = '<option value="">all strains</option>' +
    strains.map(s => `<option>${s}</option>`).join('');
  $('strain').value = strains.includes(cur) ? cur : '';
}

// Populate the brand dropdown (alphabetical, with product counts so dupes cluster) with only the
// brands present under the chosen category + type + strain. Keeps the current pick if still valid.
function fillBrands() {
  const cat = $('cat').value, ptype = $('ptype').value, strain = $('strain').value;
  const cur = $('brand').value;
  const bc = {};
  PRODUCTS.forEach(x => {
    if (x.b && (!cat || x.c === cat) && (!ptype || x.pt === ptype) && (!strain || x.t === strain))
      bc[x.b] = (bc[x.b] || 0) + 1;
  });
  const brands = Object.keys(bc).sort((a, b) => a.localeCompare(b));
  $('brand').innerHTML = `<option value="">all brands (${brands.length})</option>` +
    brands.map(b => `<option value="${b}">${b} (${bc[b].toLocaleString()})</option>`).join('');
  $('brand').value = brands.includes(cur) ? cur : '';
}

// Populate the store dropdown (by storefront name) with only the stores that carry a product under
// the chosen category + type + strain + brand. Keeps the current pick if still valid, else resets.
function fillStores() {
  const cat = $('cat').value, ptype = $('ptype').value, strain = $('strain').value;
  const brand = $('brand').value, cur = $('store').value;
  const keys = new Set();
  PRODUCTS.forEach(x => {
    if ((!cat || x.c === cat) && (!ptype || x.pt === ptype) && (!strain || x.t === strain) &&
        (!brand || x.b === brand)) keys.add(x.s);
  });
  const stk = [...keys].map(k => [k, (STORES[k]||{}).n || k]).sort((a, b) => a[1].localeCompare(b[1]));
  $('store').innerHTML = '<option value="">all stores</option>' +
    stk.map(([k, n]) => `<option value="${k}">${n}</option>`).join('');
  $('store').value = keys.has(cur) ? cur : '';
}

// Refresh the city autocomplete list with only the cities present under the chosen category + type
// + strain + brand + store. City is a free-text contains-filter, so this only narrows the suggested
// options (it doesn't clear what's typed).
function fillCities() {
  const cat = $('cat').value, ptype = $('ptype').value, strain = $('strain').value;
  const brand = $('brand').value, store = $('store').value, size = $('size').value;
  const set = new Set();
  PRODUCTS.forEach(x => {
    if ((!cat || x.c === cat) && (!ptype || x.pt === ptype) && (!strain || x.t === strain) &&
        (!brand || x.b === brand) && (!store || x.s === store) &&
        (!size || sizeBuckets(x).includes(size))) {
      const c = (STORES[x.s]||{}).c;
      if (c) set.add(c);
    }
  });
  $('citylist').innerHTML = [...set].sort().map(c => `<option value="${c}">`).join('');
}

// Named size buckets PER category ({category_std: [canonical weight labels]}) — the sizes that
// carry real volume within that category across the whole USA (Flower in eighths/ounces, Vape &
// Concentrate in 1-2 g). A size that's odd for its category — and every dosed mg / "each" /
// no-size product — folds into "Other".
const COMMON_BY_CAT = {"Concentrate": ["1g", "2g", "3g", "3.5g", "4g", "5g", "7g"], "Flower": ["1g", "3.5g", "7g", "14g", "28g"], "Pre-Roll": ["1g", "1.2g", "1.25g", "1.3g", "1.5g", "2g", "2.5g", "3g", "3.5g", "5g", "7g", "10g", "14g", "28g"], "Vape": ["0.5g", "1g", "2g", "3g", "5g"]};

// Grams in a label ("3.5g" -> 3.5) for ordering the pulldown; non-weight labels ("Other") sort last.
const sizeG = s => { const n = parseFloat(s); return (s.endsWith('g') && n > 0) ? n : Infinity; };

// A product's size labels (`sz` is " / "-joined) bucketed for the pulldown against ITS category's
// common set: each common weight kept as-is, everything else collapsed to a single "Other".
function sizeBuckets(x) {
  if (!x.sz) return [];
  const common = new Set(COMMON_BY_CAT[x.c] || []);
  const set = new Set();
  x.sz.split(' / ').forEach(s => set.add(common.has(s) ? s : 'Other'));
  return [...set];
}

// Populate the size dropdown with the buckets present under the chosen category + type + strain +
// brand + store: common weights ascending, then "Other" last. The cascade already scopes these to
// the chosen category + type, so the list narrows to that type's real sizes. Keeps a valid pick.
function fillSizes() {
  const cat = $('cat').value, ptype = $('ptype').value, strain = $('strain').value;
  const brand = $('brand').value, store = $('store').value, cur = $('size').value;
  const present = new Set();
  PRODUCTS.forEach(x => {
    if ((!cat || x.c === cat) && (!ptype || x.pt === ptype) && (!strain || x.t === strain) &&
        (!brand || x.b === brand) && (!store || x.s === store))
      sizeBuckets(x).forEach(s => present.add(s));
  });
  const sizes = [...present].sort((a, b) => (sizeG(a) - sizeG(b)) || a.localeCompare(b));
  $('size').innerHTML = '<option value="">all sizes</option>' +
    sizes.map(s => `<option>${s}</option>`).join('');
  $('size').value = sizes.includes(cur) ? cur : '';
}

function render() {
  const q = $('q').value.toLowerCase().trim();
  const brand = $('brand').value, ptype = $('ptype').value;
  const cat = $('cat').value, strain = $('strain').value, store = $('store').value;
  const size = $('size').value;
  const city = $('city').value.trim().toLowerCase();
  const minThc = parseFloat($('thc').value), maxP = parseFloat($('pmax').value);
  let rows = PRODUCTS.filter(x =>
    (!q || x._q.includes(q)) &&
    (!brand || x.b === brand) && (!ptype || x.pt === ptype) &&
    (!cat || x.c === cat) && (!strain || x.t === strain) && (!store || x.s === store) &&
    (!size || sizeBuckets(x).includes(size)) &&
    (!city || (((STORES[x.s]||{}).c)||'').toLowerCase().includes(city)) &&
    (isNaN(minThc) || (x.thc != null && x.thc >= minThc)) &&
    (isNaN(maxP) || (x.p != null && x.p <= maxP)));
  rows.sort((a,b) => {
    let va = getv(a, sortK), vb = getv(b, sortK);
    if (va == null) return 1; if (vb == null) return -1;
    return (typeof va === 'number' ? va - vb : (''+va).localeCompare(''+vb)) * sortDir;
  });
  $('count').textContent = `${rows.length.toLocaleString()} products` +
    (rows.length > CAP ? ` (showing first ${CAP} — refine to narrow)` : '');
  $('rows').innerHTML = rows.slice(0, CAP).map(x => {
    const st = STORES[x.s] || {};
    const cell = v => v == null ? '' : v;
    const tps = TERPENES.map(t => `<td class="num">${(x.tp && x.tp[t] != null) ? x.tp[t] : ''}</td>`).join('');
    const store = st.n ? (st.c && !(''+st.n).includes(st.c) ? st.n + ', ' + st.c : st.n) : '';
    return `<tr><td>${cell(x.n)}</td><td>${cell(x.b)}</td><td>${cell(x.c)}</td>` +
      `<td>${cell(x.pt)}</td><td>${cell(x.t)}</td><td class="num">${cell(x.thc)}</td><td class="num">${cell(x.cbd)}</td>` +
      `<td class="num">${x.p==null?'':'$'+x.p}</td><td>${cell(x.sz)}</td>${tps}<td>${store}</td></tr>`;
  }).join('');
}

document.querySelectorAll('th[data-k]').forEach(th => th.onclick = () => {
  const k = th.dataset.k; sortDir = (sortK === k) ? -sortDir : 1; sortK = k; render();
});
// Debounce the free-text inputs so a fast typist doesn't trigger a full 145k-row filter per
// keystroke; the numeric inputs stay immediate.
const debounce = (fn, ms) => { let t; return () => { clearTimeout(t); t = setTimeout(fn, ms); }; };
const dRender = debounce(render, 120);
['q','city'].forEach(id => $(id).oninput = dRender);
['thc','pmax'].forEach(id => $(id).oninput = render);
// The Category → Type → Strain → Brand → Store → Size → City cascade: each re-scopes every below it.
$('cat').oninput = () => { fillTypes(); fillStrains(); fillBrands(); fillStores(); fillSizes(); fillCities(); render(); };
$('ptype').oninput = () => { fillStrains(); fillBrands(); fillStores(); fillSizes(); fillCities(); render(); };
$('strain').oninput = () => { fillBrands(); fillStores(); fillSizes(); fillCities(); render(); };
$('brand').oninput = () => { fillStores(); fillSizes(); fillCities(); render(); };
$('store').oninput = () => { fillSizes(); fillCities(); render(); };
$('size').oninput = () => { fillCities(); render(); };
$('state').onchange = () => loadState($('state').value);
// Single-state build (e.g. the standalone PA site): the state pulldown is pointless — hide it and
// name the state in the heading instead.
if ($('state').options.length === 1) {
  $('state').style.display = 'none';
  document.querySelector('h1').textContent = $('state').value + ' dispensary product search';
}
loadState($('state').value);
</script></body></html>
